<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — {{company}}</title>
  <style>
    :root {
      --primary: {{primary_color}};
      --secondary: {{secondary_color}};
      --accent: {{accent_color}};
      --font-body: {{font_family}};
      --font-heading: {{heading_font}};
      --bg: #ffffff;
      --text: #1a1a2e;
      --text-light: #6b7280;
      --border: #e5e7eb;
      --code-bg: #f3f4f6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); color: var(--text); background: var(--bg); line-height: 1.7; max-width: 900px; margin: 0 auto; padding: 0 2rem; }

    .doc-header { background: var(--secondary); color: white; padding: 3rem 2rem; margin: 0 -2rem; text-align: center; }
    .doc-header img.logo { height: 60px; margin-bottom: 1rem; }
    .doc-header h1 { font-family: var(--font-heading); font-size: 2.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .doc-header .subtitle { font-size: 1.2rem; opacity: 0.85; }
    .doc-header .meta { margin-top: 1rem; font-size: 0.85rem; opacity: 0.65; }

    .toc { background: var(--code-bg); border-left: 4px solid var(--primary); padding: 1.5rem 2rem; margin: 2rem 0; border-radius: 0 8px 8px 0; }
    .toc h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary); margin-bottom: 0.75rem; }
    .toc ol { padding-left: 1.25rem; }
    .toc li { margin-bottom: 0.4rem; }
    .toc a { color: var(--text); text-decoration: none; border-bottom: 1px dotted var(--border); }
    .toc a:hover { color: var(--primary); border-bottom-color: var(--primary); }

    .section { margin: 3rem 0; padding-top: 1rem; border-top: 2px solid var(--border); }
    h2 { font-family: var(--font-heading); font-size: 1.75rem; color: var(--primary); margin-bottom: 1rem; }
    h3 { font-family: var(--font-heading); font-size: 1.25rem; color: var(--text); margin: 1.5rem 0 0.75rem; }
    p { margin-bottom: 1rem; }
    ul, ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    li { margin-bottom: 0.35rem; }

    pre { background: var(--secondary); color: #e6db74; padding: 1rem 1.5rem; border-radius: 8px; overflow-x: auto; font-size: 0.9rem; line-height: 1.5; margin-bottom: 1rem; }
    code { background: var(--code-bg); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
    pre code { background: none; padding: 0; }

    table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--code-bg); font-weight: 600; color: var(--primary); }

    .callout { padding: 1rem 1.5rem; border-radius: 8px; margin-bottom: 1rem; }
    .callout.info { background: #eff6ff; border-left: 4px solid var(--primary); }
    .callout.warning { background: #fefce8; border-left: 4px solid var(--accent); }
    .callout.tip { background: #f0fdf4; border-left: 4px solid #22c55e; }

    .doc-footer { background: var(--secondary); color: white; padding: 1.5rem 2rem; margin: 3rem -2rem 0; text-align: center; font-size: 0.85rem; opacity: 0.8; }

    @media print {
      body { max-width: 100%; padding: 0; }
      .doc-header { break-after: page; }
      .section { break-inside: avoid; }
      pre { white-space: pre-wrap; }
    }
  </style>
</head>
<body>
  <header class="doc-header">
    <img src="{{logo_src}}" alt="{{company}} logo" class="logo">
    <h1>{{title}}</h1>
    <p class="subtitle">{{subtitle}}</p>
    <p class="meta">{{author}} &middot; Version {{version}} &middot; {{date}}</p>
  </header>

  <nav class="toc">
    <h2>Table of Contents</h2>
    {{toc}}
  </nav>

  {{content}}

  <footer class="doc-footer">
    <p>Generated by Doc Generator Skill &middot; {{company}} &middot; {{date}}</p>
  </footer>
</body>
</html>
